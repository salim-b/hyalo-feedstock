context:
  version: "0.12.0"

package:
  name: hyalo
  version: ${{ version }}

source:
  url: https://github.com/ractive/hyalo/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 43695661ed0786d778bd8389667662c146a181046e7386fbbbc20939cf0d273f

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cd crates/hyalo-cli
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
          # generate shell completions
          - mkdir -p $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d $PREFIX/share/zsh/site-functions
          - $PREFIX/bin/hyalo completion bash > $PREFIX/share/bash-completion/completions/hyalo
          - $PREFIX/bin/hyalo completion fish > $PREFIX/share/fish/vendor_completions.d/hyalo.fish
          - $PREFIX/bin/hyalo completion zsh > $PREFIX/share/zsh/site-functions/_hyalo
      - if: win
        then:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
          # generate shell completions
          - mkdir %LIBRARY_PREFIX%\share\bash-completion\completions
          - mkdir %LIBRARY_PREFIX%\share\fish\vendor_completions.d
          - mkdir %LIBRARY_PREFIX%\share\zsh\site-functions
          - '%LIBRARY_BIN%\hyalo.exe completion bash > %LIBRARY_PREFIX%\share\bash-completion\completions\hyalo'
          - '%LIBRARY_BIN%\hyalo.exe completion fish > %LIBRARY_PREFIX%\share\fish\vendor_completions.d\hyalo.fish'
          - '%LIBRARY_BIN%\hyalo.exe completion zsh > %LIBRARY_PREFIX%\share\zsh\site-functions\_hyalo'
      - cargo-bundle-licenses --format yaml --output ../../THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - hyalo --help
      - hyalo --version
  - package_contents:
      bin:
        - hyalo
      files:
        - if: unix
          then:
            - share/bash-completion/completions/hyalo
            - share/fish/vendor_completions.d/hyalo.fish
            - share/zsh/site-functions/_hyalo
        - if: win
          then:
            - Library/share/bash-completion/completions/hyalo
            - Library/share/fish/vendor_completions.d/hyalo.fish
            - Library/share/zsh/site-functions/_hyalo
      strict: true

about:
  summary: Download and install release assets from GitHub
  description: |
    Hyalo is a high-performance CLI tool designed to query, manage, and bulk-edit Markdown collections
    that use YAML frontmatter, such as Obsidian vaults, Zettelkastens, and static documentation sites.
    Hyalo natively understands Markdown structures to offer advanced filtering, bulk metadata mutations,
    and smart link refactoring across thousands of files in milliseconds. With native JSON output,
    built-in AI agent integrations, and robust dry-run safety features, Hyalo provides a fast,
    scriptable solution for maintaining and automating complex knowledge bases.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/ractive/hyalo
  repository: https://github.com/ractive/hyalo

extra:
  recipe-maintainers:
    - salim-b
